<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4f1ea">
  <title>LiteratureSearch | Find Literature You Need</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#f4f1ea',
            ink: '#1c1c1c',
          },
          fontFamily: {
            serif: ['Merriweather', 'serif'],
            masthead: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-paper text-ink font-serif min-h-screen overflow-x-hidden selection:bg-ink selection:text-paper;
        background-image: radial-gradient(rgba(28, 28, 28, 0.08) 1px, transparent 1px);
        background-size: 16px 16px;
        background-attachment: fixed;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    }

    @layer components {
      .app-container-safe {
        @apply max-w-5xl mx-auto py-6 sm:py-8 flex flex-col min-h-screen;
        padding-left: max(1rem, env(safe-area-inset-left));
        padding-right: max(1rem, env(safe-area-inset-right));
        padding-bottom: max(2rem, env(safe-area-inset-bottom));
        transform: translateZ(0);
      }

      .no-tap {
        -webkit-tap-highlight-color: transparent;
      }

      .title-landing {
        @apply text-[clamp(1.6rem,8vw,3.5rem)] leading-[1.1];
        transform: translateZ(0);
      }

      .title-compact {
        @apply !text-[clamp(1rem,4vw,1.8rem)] !leading-[1.2];
        transform: translateZ(0);
      }

      @keyframes abstract-fade {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .abstract-expansion {
        animation: abstract-fade 0.3s ease-out forwards;
      }
    }
  </style>
</head>

<body class="no-tap">
  <div class="app-container-safe" id="app-container">

    <header id="header-section"
      class="flex flex-col items-center justify-center min-h-[70vh] transition-[min-height,padding] duration-700 ease-in-out will-change-[min-height]">

      <div class="text-center w-full transition-[transform,opacity] duration-700 ease-in-out will-change-transform"
        id="logo-container">
        <h1 id="logo-title"
          class="font-masthead font-black tracking-tight text-ink transition-[font-size,transform] duration-700 ease-in-out title-landing will-change-[font-size] cursor-pointer">
          LiteratureSearch
        </h1>
        <p class="italic text-sm text-ink/60 mt-1 mb-6 font-serif opacity-100 transition-opacity duration-500 ease-in-out"
          id="subtitle">"Find Literature You Need"</p>
      </div>

      <div class="w-full max-w-xl transition-transform duration-500 ease-in-out will-change-transform"
        id="search-container">
        <form id="search-form" class="w-full">
          <div class="flex items-center border-b-2 border-ink/30 focus-within:border-ink transition-colors pb-1">
            <svg class="w-5 h-5 mr-3 flex-shrink-0 text-ink/50" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <!-- font-size:16px prevents iOS auto-zoom on focus -->
            <input type="text" id="search-input"
              class="w-full bg-transparent border-none outline-none text-ink font-serif py-3 placeholder-ink/30 text-base"
              placeholder="Search the archives…" autocomplete="off" autocorrect="off" autocapitalize="none"
              spellcheck="false">
            <button type="submit"
              class="flex-shrink-0 text-ink uppercase tracking-widest text-xs font-bold py-3 px-4 hover:underline underline-offset-8 decoration-1 focus:outline-none active:opacity-60 transition-all touch-manipulation no-tap">
              Search
            </button>
          </div>
        </form>

        <div id="filter-container" class="flex flex-col gap-6 mt-8 transition-all duration-500 ease-in-out">
          <div class="flex flex-col">
            <label class="text-[0.6rem] uppercase tracking-[0.2em] text-ink/60 mb-3 font-bold">Archives</label>
            <div id="conference-filters" class="flex flex-wrap gap-x-4 gap-y-2">
              <!-- Dynamically populated -->
            </div>
          </div>
          <div class="flex flex-col">
            <label class="text-[0.6rem] uppercase tracking-[0.2em] text-ink/60 mb-3 font-bold">Chronology</label>
            <div id="year-filters" class="flex flex-wrap gap-x-4 gap-y-2 no-tap">
              <!-- Dynamically populated -->
            </div>
          </div>
        </div>

        <!-- Example / recent-search pills -->
        <div id="example-pills" class="flex flex-wrap gap-2 mt-6 text-[0.65rem] uppercase tracking-widest">
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">mri</span>
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">classification</span>
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">calibration</span>
        </div>
      </div>

      <!-- Purpose Loop / Help Text -->
      <div id="purpose-section" class="mt-20 text-center transition-all duration-700 delay-500">
        <p id="purpose-text" class="italic text-[0.8rem] sm:text-[0.9rem] text-ink/40 font-serif min-h-[3rem] max-w-sm mx-auto leading-relaxed transition-all duration-700 ease-in-out will-change-transform">
          <!-- Dynamically populated loop -->
        </p>
      </div>
    </header>

    <main id="results-section"
      class="opacity-0 translate-y-4 invisible transition-[opacity,transform] duration-700 delay-300 pt-6 sm:pt-8 flex-1 will-change-[opacity,transform]">
      <div class="py-2 mb-4">
        <h2 id="results-count" class="font-masthead italic text-base sm:text-lg font-bold text-center opacity-60"></h2>
      </div>
      <div id="results-list" class="flex flex-col gap-1"></div>
    </main>

  </div>
  <script type="module" src="js/app.js?v=3"></script>
</body>

</html>
