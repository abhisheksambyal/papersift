<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f4f1ea">
  <title>MedSearch | Find Literature You Need</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#f4f1ea',
            ink: '#1c1c1c',
          },
          fontFamily: {
            serif: ['Merriweather', 'serif'],
            masthead: ['"Playfair Display"', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Respect iPhone notch / home-bar safe areas */
    #app-container {
      padding-left: max(1rem, env(safe-area-inset-left));
      padding-right: max(1rem, env(safe-area-inset-right));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }

    /* Prevent tap highlight on interactive elements */
    .pill-example,
    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    /* Sophisticated dense dot grid background */
    body {
      background-image: radial-gradient(rgba(28, 28, 28, 0.08) 1px, transparent 1px);
      background-size: 16px 16px;
      background-attachment: fixed;
    }

    /* Title sizes */
    .title-landing {
      font-size: clamp(1.6rem, 8vw, 3.5rem);
      line-height: 1.1;
    }
    .title-compact {
      font-size: clamp(1rem, 4vw, 1.8rem) !important;
      line-height: 1.2 !important;
    }
  </style>
</head>

<body class="bg-paper text-ink font-serif min-h-screen overflow-x-hidden selection:bg-ink selection:text-paper">
  <div class="max-w-5xl mx-auto py-6 sm:py-8 flex flex-col min-h-screen" id="app-container">

    <header id="header-section"
      class="flex flex-col items-center justify-center min-h-[70vh] transition-all duration-700 ease-in-out">

      <div class="text-center w-full transition-all duration-700" id="logo-container">
        <h1 id="logo-title" class="font-masthead font-black tracking-tight text-ink transition-all duration-700 title-landing">
          LiteratureSearch
        </h1>
        <p class="italic text-sm text-ink/60 mt-1 mb-6 font-serif" id="subtitle">"Find Literature You Need"</p>
      </div>

      <div class="w-full max-w-xl transition-all duration-500 ease-in-out" id="search-container">
        <form id="search-form" class="w-full">
          <div class="flex items-center border-b-2 border-ink/30 focus-within:border-ink transition-colors pb-1">
            <svg class="w-5 h-5 mr-3 flex-shrink-0 text-ink/50" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
              <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <!-- font-size:16px prevents iOS auto-zoom on focus -->
            <input type="text" id="search-input"
              class="w-full bg-transparent border-none outline-none text-ink font-serif py-3 placeholder-ink/30"
              style="font-size: 16px;" placeholder="Search the archives…" autocomplete="off" autocorrect="off"
              autocapitalize="none" spellcheck="false">
            <button type="submit"
              class="flex-shrink-0 text-ink uppercase tracking-widest text-xs font-bold py-3 px-4 hover:underline underline-offset-8 decoration-1 focus:outline-none active:opacity-60 transition-all touch-manipulation">
              Search
            </button>
          </div>
        </form>

        <!-- Example / recent-search pills -->
        <div id="example-pills" class="flex flex-wrap gap-2 mt-4 text-[0.65rem] uppercase tracking-widest">
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">mri</span>
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">classification</span>
          <span
            class="pill-example bg-ink/[0.03] border border-ink/10 px-3 py-2 rounded-full cursor-pointer hover:bg-ink hover:text-paper active:bg-ink active:text-paper transition-all touch-manipulation">calibration</span>
        </div>
      </div>
    </header>

    <main id="results-section"
      class="opacity-0 translate-y-8 invisible transition-all duration-700 delay-300 pt-6 sm:pt-8 flex-1">
      <div class="py-2 mb-4">
        <h2 id="results-count" class="font-masthead italic text-base sm:text-lg font-bold text-center opacity-60"></h2>
      </div>
      <div id="results-list" class="flex flex-col gap-1"></div>
    </main>

  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
